services:
  redis:
    image: redis:7-alpine
    #container_name: hng14-stage2-devops-redis-1
    ports:
      - "6379:6379"
    networks:
      - app-network
    volumes:
      - redis-data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  api:
    build: ./api
    #container_name: hng14-stage2-devops-api-1
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    ports:
      - "8000:8000"
    restart: unless-stopped
    # FIX: Improved healthcheck to handle slow startup and prevent timeout
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; import sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').read().decode().find('\\\"status\\\":\\\"ok\\\"') != -1 else 1)\""]
      interval: 10s           # Check more frequently
      timeout: 30s            # Increased timeout for slow responses
      retries: 15             # More retries for slow startup
      start_period: 60s       # Longer startup grace period
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"

  worker:
    build: ./worker
    environment:
      REDIS_URL: ${REDIS_URL}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"

  frontend:
    build: ./frontend
    environment:
      REACT_APP_API_URL: ${API_URL}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-network
    ports:
      - "3000:3000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"

networks:
  app-network:
    driver: bridge

volumes:
  redis-data:
    driver: local    